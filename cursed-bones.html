<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CURSED BONES: PRECISION LOCK</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-green: #39ff14;
            --retro-red: #ff0055;
            --bg: #0a0a0a;
        }

        html, body {
            height: 100%;
            overflow: hidden; 
            position: fixed;
            width: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
        }

        #game-header {
            width: 100%;
            height: 50px;
            background: #111;
            border-bottom: 2px solid var(--retro-red);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: calc(100vh - 50px);
            display: flex;
            justify-content: center;
            background: var(--bg);
        }

        /* PRECISION LOCK: This must match the width where you took coordinates */
        #skeleton-wrapper {
            position: relative;
            width: 70vw; /* Adjust this percentage to make him 'bigger' or 'smaller' */
            max-width: 320px; 
            height: fit-content;
            margin-top: 90px;
        }

        #skeleton-image {
            width: 100%;
            display: block;
            pointer-events: none;
            filter: brightness(0.9);
        }

        /* SIDE DOCKS: Floating and non-intrusive */
        .side-dock {
            position: absolute;
            top: 0;
            width: 75px;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 10px 2px;
            overflow-y: auto;
            z-index: 100;
            background: rgba(255, 255, 255, 0.05);
        }

        #dock-left { left: 0; }
        #dock-right { right: 0; }

        .label-sticker {
            padding: 6px 2px;
            background: var(--neon-blue);
            color: black;
            font-weight: bold;
            font-size: 8px;
            border-radius: 3px;
            touch-action: none;
            z-index: 1000;
            text-align: center;
            text-transform: uppercase;
            box-shadow: 2px 2px 0px #005f73;
        }

        .label-sticker.locked {
            background: var(--neon-green) !important;
            box-shadow: 0 0 12px var(--neon-green);
            color: black;
            pointer-events: none;
        }

        .static { position: relative !important; width: 90%; margin: 0 auto; }

        #win-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5000;
        }
    </style>
</head>
<body>

    <div id="game-header">
        <div style="font-size: 14px;">REANIMATED: <span id="count">0</span>/17</div>
    </div>

    <div id="game-container">
        <div id="dock-left" class="side-dock"></div>

        <div id="skeleton-wrapper">
            <img src="skeleton.JPG" id="skeleton-image">
            </div>

        <div id="dock-right" class="side-dock"></div>
    </div>

    <div id="win-overlay">
        <h1 style="color: var(--neon-green); font-size: 40px; text-align:center;">COMPLETE</h1>
        <button onclick="location.reload()" style="padding: 15px; background: black; color: white; border: 2px solid var(--retro-red); font-family: inherit;">RESTART</button>
    </div>

<script>
    // YOUR ORIGINAL COORDINATES
    const config = {
        "cervical": { top: "26.9%", left: "33.9%", side: "left" },
        "patella": { top: "79.1%", left: "52.1%", side: "right" },
        "femur": { top: "68.1%", left: "34.6%", side: "left" },
        "coccyx": { top: "56.6%", left: "43.4%", side: "right" },
        "radius": { top: "53.3%", left: "71.6%", side: "left" },
        "coxal": { top: "53.5%", left: "53.3%", side: "right" },
        "lumbar": { top: "50.2%", left: "37.7%", side: "left" },
        "thoracic": { top: "43.1%", left: "35.1%", side: "right" },
        "ribs": { top: "39.5%", left: "54.5%", side: "left" },
        "ulna": { top: "54.3%", left: "27.7%", side: "right" },
        "humerus": { top: "38.7%", left: "25.6%", side: "left" },
        "clavicle": { top: "28.8%", left: "53.8%", side: "right" },
        "scapula": { top: "31.9%", left: "55.0%", side: "left" },
        "sternum": { top: "33.0%", left: "43.1%", side: "right" },
        "mandible": { top: "21.0%", left: "31.5%", side: "left" },
        "acromion": { top: "29.2%", left: "27.7%", side: "right" },
        "cranium": { top: "15.3%", left: "43.1%", side: "left" }
    };

    const leftDock = document.getElementById('dock-left');
    const rightDock = document.getElementById('dock-right');
    const wrapper = document.getElementById('skeleton-wrapper');
    let solvedCount = 0;

    Object.keys(config).forEach(id => {
        const div = document.createElement('div');
        div.id = id;
        div.className = 'label-sticker static';
        div.innerText = id.replace('_', ' ');
        
        if(config[id].side === "left") leftDock.appendChild(div);
        else rightDock.appendChild(div);

        div.addEventListener('touchstart', (e) => {
            div.classList.remove('static');
            div.style.position = 'absolute';
            wrapper.appendChild(div); 
        });

        div.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.targetTouches[0];
            const rect = wrapper.getBoundingClientRect();
            let x = ((touch.pageX - rect.left) / rect.width * 100);
            let y = ((touch.pageY - rect.top) / rect.height * 100);
            div.style.left = x + '%';
            div.style.top = y + '%';
        }, {passive: false});

        div.addEventListener('touchend', (e) => {
            const touch = e.changedTouches[0];
            const rect = wrapper.getBoundingClientRect();
            let finalX = ((touch.pageX - rect.left) / rect.width * 100);
            let finalY = ((touch.pageY - rect.top) / rect.height * 100);

            const target = config[div.id];
            // SNAP THRESHOLD: Increased to 7% for easier mobile play
            if (Math.abs(finalX - parseFloat(target.left)) < 7 && 
                Math.abs(finalY - parseFloat(target.top)) < 7) {
                div.style.left = target.left;
                div.style.top = target.top;
                div.classList.add('locked');
                solvedCount++;
                document.getElementById('count').innerText = solvedCount;
                if (solvedCount === 17) document.getElementById('win-overlay').style.display = 'flex';
            } else {
                div.classList.add('static');
                if(config[div.id].side === "left") leftDock.appendChild(div);
                else rightDock.appendChild(div);
            }
        });
    });
</script>
</body>
</html>
