<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-CHEM TACTICAL TERMINAL</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
            --card-bg: #121212;
            --text: #ffffff;
            --accent-green: #39ff14;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }

        header {
            border-bottom: 2px solid var(--neon-blue);
            margin-bottom: 20px;
            padding: 10px 0;
        }

        header h1 {
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.3rem;
            margin: 0;
            font-weight: 900;
        }

        .breadcrumb {
            font-size: 0.7rem;
            color: var(--neon-purple);
            text-transform: uppercase;
            margin-top: 5px;
        }

        .asset-box {
            background: #fff;
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .asset-box img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 6px;
        }

        .card {
            background: var(--card-bg);
            border-left: 4px solid var(--neon-purple);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 10px 10px 0;
        }

        h2 {
            color: var(--neon-blue);
            font-size: 1rem;
            text-transform: uppercase;
            margin: 0 0 10px 0;
        }

        .intel-alert {
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 10px;
            font-size: 0.8rem;
            border-radius: 6px;
            background: rgba(57, 255, 20, 0.05);
            margin-top: 10px;
        }

        .status-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--neon-blue);
            color: #000;
            padding: 8px 15px;
            font-weight: 900;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <header>
        <h1>O-CHEM TERMINAL</h1>
        <div class="breadcrumb">DIRECTIVE: CRNA_DOCTORATE // LVL 01</div>
    </header>

    <div class="asset-box">
        <img src="medical/ochem-img/Cracking-the-code.PNG" alt="Cracking the Code Overview">
    </div>

    <section class="card">
        <h2>Phase 1: Tactical Triage</h2>
        <div class="asset-box" style="background: transparent; border: none; padding: 0;">
            <img src="medical/ochem-img/oc-language-of-lines-triage.PNG" alt="Language of Lines Triage">
        </div>
        <div class="intel-alert">
            <strong>CRNA NOTE:</strong> Skeletal structures are the "vitals" of a molecule. Don't count carbons—read the flow.
        </div>
    </section>

    <section class="card">
        <h2>Phase 2: Functional Mastery</h2>
        <div class="asset-box">
            <img src="medical/ochem-img/functional-groups-oc.JPG" alt="Functional Groups Chart">
        </div>
        <div class="asset-box" style="margin-top: 10px;">
            <img src="medical/ochem-img/ochem-action-zones.JPG" alt="O-Chem Action Zones">
        </div>
    </section>

    <footer class="status-footer">
        <span>USER: E_PLANTE // CURVE_KILLER</span>
        <span>ENCRYPTED_ACCESS: ACTIVE</span>
    </footer>

</body>
</html>
