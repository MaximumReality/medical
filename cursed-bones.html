<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CURSED BONES: Mobile Lab</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #skeleton-container {
            position: relative;
            width: 420px;
            margin-top: 20px;
            border: 2px solid #333;
            overflow: hidden;
        }

        #skeleton-image {
            width: 100%;
            display: block;
            pointer-events: none; /* Prevents long-press save image on mobile */
        }

        /* The labels you will drag */
        .label-box {
            position: absolute;
            padding: 8px 12px;
            background: #3498db;
            color: white;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            z-index: 100;
            touch-action: none; /* Crucial for mobile drag */
            user-select: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        /* These are the 'Target Blanks' on the photo */
        /* Use these to visually align. Change border to 'none' when done. */
        .target-blank {
            position: absolute;
            border: 2px dashed rgba(255, 0, 0, 0.5); 
            pointer-events: none;
            width: 80px;
            height: 25px;
        }

        #controls {
            padding: 20px;
            text-align: center;
        }

        .terminal-button {
            padding: 15px 30px;
            background: black;
            color: #00ff66;
            border: 2px solid #00ff66;
            font-family: 'Courier New', monospace;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="controls">
        <h2>DRAG BONES TO ALIGN</h2>
        <p style="font-size: 10px;">Drag labels onto the skeleton blanks.</p>
    </div>

    <div id="skeleton-container">
        <img src="skeleton.JPG" id="skeleton-image" alt="Skeleton">

        <div class="target-blank" style="top: 48px; left: 258px;" id="target-cranium"></div>
        <div class="target-blank" style="top: 125px; left: 75px;" id="target-mandible"></div>

        <div id="cranium" class="label-box" style="top: 10px; left: 10px;">CRANIUM</div>
        <div id="mandible" class="label-box" style="top: 10px; left: 110px;">MANDIBLE</div>
        <div id="humerus" class="label-box" style="top: 10px; left: 210px;">HUMERUS</div>
        <div id="femur" class="label-box" style="top: 50px; left: 10px;">FEMUR</div>
        <div id="patella" class="label-box" style="top: 50px; left: 110px;">PATELLA</div>
    </div>

    <div id="controls">
        <button class="terminal-button" onclick="location.href='index.html'">RESET LEVEL</button>
    </div>

    <script>
        const labels = document.querySelectorAll('.label-box');

        labels.forEach(label => {
            label.addEventListener('touchstart', (e) => {
                label.style.zIndex = "1000";
                label.style.background = "#e74c3c"; // Change color while dragging
            });

            label.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.targetTouches[0];
                const container = document.getElementById('skeleton-container').getBoundingClientRect();

                // Calculate relative position
                let x = touch.pageX - container.left - (label.offsetWidth / 2);
                let y = touch.pageY - container.top - (label.offsetHeight / 2);

                // Keep within container boundaries
                label.style.left = x + 'px';
                label.style.top = y + 'px';
            }, {passive: false});

            label.addEventListener('touchend', () => {
                label.style.zIndex = "100";
                label.style.background = "#3498db";
                
                // Alert the coordinates so you can save them in your CSS later!
                console.log(`${label.innerText} set at: Top ${label.style.top}, Left ${label.style.left}`);
            });
        });
    </script>
</body>
</html>
