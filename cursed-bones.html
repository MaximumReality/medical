<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CURSED BONES: THE ALIGNMENT</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        
        #skeleton-container {
            position: relative;
            width: 90vw;
            max-width: 400px;
            margin: 20px auto;
            border: 2px solid #444;
        }

        #skeleton-image { width: 100%; display: block; pointer-events: none; }

        /* DEBUG MODE: These red boxes show you WHERE to drag the stickers */
        .drop-zone {
            position: absolute;
            width: 60px;
            height: 25px;
            border: 2px solid red; /* Change to 'none' when finished! */
            background: rgba(255, 0, 0, 0.2);
            z-index: 50;
            pointer-events: none; /* Let the touch go THROUGH to the sticker */
        }

        .label-sticker {
            position: absolute;
            padding: 8px;
            background: #00d4ff;
            color: black;
            font-weight: bold;
            font-size: 11px;
            border-radius: 4px;
            touch-action: none;
            z-index: 100;
            white-space: nowrap;
        }

        #sticker-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            padding: 20px;
            background: #222;
        }

        .static { position: relative !important; top: auto !important; left: auto !important; }
    </style>
</head>
<body>

    <h2>ALIGN THE BONES</h2>
    <p>Drag blue boxes into red boxes.</p>

    <div id="skeleton-container">
        <img src="skeleton.JPG" id="skeleton-image">

        <div class="drop-zone" style="top: 52px; left: 63%;" id="zone-cranium"></div>
        <div class="drop-zone" style="top: 118px; left: 18%;" id="zone-mandible"></div>
        <div class="drop-zone" style="top: 395px; left: 75%;" id="zone-humerus"></div>
    </div>

    <div id="sticker-bank">
        <div id="cranium" class="label-sticker static">CRANIUM</div>
        <div id="mandible" class="label-sticker static">MANDIBLE</div>
        <div id="humerus" class="label-sticker static">HUMERUS</div>
    </div>

<script>
    const stickers = document.querySelectorAll('.label-sticker');
    const container = document.getElementById('skeleton-container');

    stickers.forEach(sticker => {
        sticker.addEventListener('touchstart', (e) => {
            sticker.classList.remove('static');
            sticker.style.position = 'absolute';
        });

        sticker.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.targetTouches[0];
            const rect = container.getBoundingClientRect();

            // Movement logic
            sticker.style.left = (touch.pageX - rect.left - 30) + 'px';
            sticker.style.top = (touch.pageY - rect.top - 12) + 'px';
        }, {passive: false});

        sticker.addEventListener('touchend', (e) => {
            const stickerRect = sticker.getBoundingClientRect();
            const targetZone = document.getElementById('zone-' + sticker.id);
            const zoneRect = targetZone.getBoundingClientRect();

            // Check if center of sticker is inside the red box
            const buffer = 40; // Makes it easier to 'hit' the target
            if (Math.abs(stickerRect.left - zoneRect.left) < buffer && 
                Math.abs(stickerRect.top - zoneRect.top) < buffer) {
                
                // SNAP!
                sticker.style.left = targetZone.style.left;
                sticker.style.top = targetZone.style.top;
                sticker.style.background = "#39ff14";
                targetZone.style.borderColor = "#39ff14";
            } else {
                // MISS - Send back to bank
                sticker.classList.add('static');
            }
        });
    });
</script>
</body>
</html>
