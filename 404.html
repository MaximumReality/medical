<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRITICAL ERROR | No Escape</title>
    
    <link rel="icon" type="image/jpeg" href="elina.jpeg">
    <link rel="apple-touch-icon" href="elina.jpeg">

    <style>
        :root {
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --retro-purple: #2b0040;
            --dark-bg: #0b1426; /* Deep space/cyberpunk blue */
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace; /* Hard hacker font */
            text-align: center;
            overflow: hidden;
            padding: 20px;
        }

        /* ── THE "TERMINAL NOISE" BACKGROUND ── */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.03), rgba(0, 0, 255, 0.05));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            opacity: 0.3;
        }

        /* ── ELINA'S PORTRAIT ── */
        #elina-icon {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue), 0 0 40px rgba(0, 255, 255, 0.3);
            object-fit: cover;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }

        /* ── THE MAIN ERROR TEXT ── */
        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink), 3px 3px 0px #000;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* ── THE "NO ESCAPE" JOKE ── */
        p {
            font-size: clamp(1rem, 4vw, 1.2rem);
            color: var(--neon-green);
            text-shadow: 1px 1px 2px #000;
            margin: 10px 0;
            line-height: 1.5;
        }

        .blink {
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* ── THE REROUTING MESSAGE ── */
        #reroute-msg {
            margin-top: 30px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }
    }
    </style>
</head>

<body>

    <img src="elina.jpeg" id="elina-icon" alt="Student Protocol">

    <h1>ERROR 404</h1>
    
    <p class="blink">[ REALITY COMPROMISED ]</p>
    
    <p>You’ve accessed a restricted sector of the terminal.<br>
       Don’t panic. There is no escape. (The studies are relentless.)</p>
    
    <p style="color:var(--neon-blue); font-size:1rem; text-shadow:none;">
       Nursing protocol requires immediate reassessment.
    </p>

    <div id="reroute-msg">
        <span class="blink">●</span> Protocol Initiated. Re-routing to Station Terminal in 5 seconds...
    </div>

    <script>
    // Reroute back to the Station Terminal entrance after 5 seconds
    setTimeout(function() {
        // If Station Terminal is in the same folder, use "index.html"
        
        window.location.href = "index.html"; 
    }, 5000);
</script>


</body>
</html>
