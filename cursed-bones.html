<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CURSED SKELETEN: Skeleton</title>

<style>

 /* Container for the skeleton + labels */
#skeleton-container {
    position: relative;
    width: 420px;        /* adjust to match your image width */
    margin: 0 auto;
}

#skeleton-image {
    width: 100%;
    display: block;
}

/* All label boxes share these styles */
.label-box {
    position: absolute;
    width: 130px;
    padding: 4px 6px;
    font-size: 14px;
    border: 2px solid #ccc;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.85);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
}

/* Correct answer feedback */
.label-box.correct {
    border-color: #2ecc71;
    background: rgba(46, 204, 113, 0.15);
}

/* Incorrect answer feedback */
.label-box.incorrect {
    border-color: #e74c3c;
    background: rgba(231, 76, 60, 0.15);
}
  #check-all {
    display: block;
    margin: 20px auto;
    padding: 10px 16px;
    font-size: 16px;
    background: #3498db;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
}

#check-all:hover {
    background: #2980b9;
}


/* Optional word bank styling */
#word-bank {
    margin-top: 20px;
    padding: 10px;
    background: #f7f7f7;
    border-radius: 8px;
    width: 420px;
    margin-left: auto;
    margin-right: auto;
}

#word-bank h3 {
    margin: 0 0 8px 0;
    font-size: 18px;
}

#word-bank ul {
    list-style: none;
    padding: 0;
    margin: 0;
    columns: 2; /* nice two-column layout */
}

#word-bank li {
    padding: 4px 0;
    font-size: 14px;
}

  /* HEAD */
#cranium { top: 20px; left: 150px; }
#mandible { top: 70px; left: 150px; }

/* SHOULDER GIRDLE */
#acromion { top: 120px; left: 40px; }
#clavicle { top: 120px; left: 250px; }
#scapula { top: 160px; left: 20px; }

/* UPPER EXTREMITY */
#humerus { top: 200px; left: 300px; }
#radius { top: 260px; left: 320px; }
#ulna { top: 300px; left: 320px; }

/* THORAX */
#ribs { top: 180px; left: 150px; }
#sternum { top: 200px; left: 150px; }

/* VERTEBRAL COLUMN */
#cervical { top: 110px; left: 150px; }
#thoracic { top: 160px; left: 150px; }
#lumbar { top: 230px; left: 150px; }

/* PELVIS */
#coxal { top: 300px; left: 150px; }
#coccyx { top: 350px; left: 150px; }

/* LOWER EXTREMITY */
#femur { top: 380px; left: 150px; }
#patella { top: 450px; left: 150px; }

  /* Fullscreen loading overlay */
#loading-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    opacity: 1;
    transition: opacity 0.8s ease;
}

/* Cursed image styling */
#loading-image {
    width: 300px;
    max-width: 80%;
    border: 3px solid #e74c3c;
    border-radius: 8px;
    margin-bottom: 20px;
}

/* Loading text */
#loading-text {
    font-size: 20px;
    font-weight: bold;
    color: #333;
}

/* Hidden state after fade-out */
#loading-screen.hidden {
    opacity: 0;
    pointer-events: none;
}

  #terminal-link {
    text-decoration: none;
}

#terminal-button {
    display: block;
    margin: 40px auto;
    padding: 14px 24px;
    font-size: 20px;
    font-family: "Courier New", monospace;
    color: #00ff66;
    background: #000000;
    border: 2px solid #00ff66;
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s ease;
}

#terminal-button:hover {
    background: #003300;
    box-shadow: 0 0 12px #00ff66;
}

#terminal-button:active {
    transform: scale(0.96);
    background: #001a00;
}



</style>
</head>
<body>
  <div id="loading-screen">
    <img src="cursed_skeleten.JPG" alt="Cursed Skeleten" id="loading-image">
    <p id="loading-text">Fixing Skeleten’s labels…</p>
</div>

<div id="skeleton-container">
    <img src="skeleton.JPG" alt="Skeleton Diagram" id="skeleton-image">
  <button id="check-all">Check All Answers</button>


    <!-- HEAD -->
    <input type="text" id="cranium" class="label-box" placeholder="Cranium">
    <input type="text" id="mandible" class="label-box" placeholder="Mandible">

    <!-- SHOULDER GIRDLE -->
    <input type="text" id="acromion" class="label-box" placeholder="Acromion">
    <input type="text" id="clavicle" class="label-box" placeholder="Clavicle">
    <input type="text" id="scapula" class="label-box" placeholder="Scapula">

    <!-- UPPER EXTREMITY -->
    <input type="text" id="humerus" class="label-box" placeholder="Humerus">
    <input type="text" id="radius" class="label-box" placeholder="Radius">
    <input type="text" id="ulna" class="label-box" placeholder="Ulna">

    <!-- THORAX -->
    <input type="text" id="ribs" class="label-box" placeholder="Ribs">
    <input type="text" id="sternum" class="label-box" placeholder="Sternum">

    <!-- VERTEBRAL COLUMN -->
    <input type="text" id="cervical" class="label-box" placeholder="Cervical Vertebrae">
    <input type="text" id="thoracic" class="label-box" placeholder="Thoracic Vertebrae">
    <input type="text" id="lumbar" class="label-box" placeholder="Lumbar Vertebrae">

    <!-- PELVIS -->
    <input type="text" id="coxal" class="label-box" placeholder="Coxal Bone">
    <input type="text" id="coccyx" class="label-box" placeholder="Coccyx">

    <!-- LOWER EXTREMITY -->
    <input type="text" id="femur" class="label-box" placeholder="Femur">
    <input type="text" id="patella" class="label-box" placeholder="Patella">
</div>

<!-- OPTIONAL WORD BANK -->
<div id="word-bank">
    <h3>Word Bank</h3>
    <ul>
        <li>Cranium</li>
        <li>Mandible</li>
        <li>Acromion</li>
        <li>Humerus</li>
        <li>Clavicle</li>
        <li>Scapula</li>
        <li>Radius</li>
        <li>Ulna</li>
        <li>Ribs</li>
        <li>Sternum</li>
        <li>Cervical vertebrae</li>
        <li>Thoracic vertebrae</li>
        <li>Lumbar vertebrae</li>
        <li>Coxal Bone</li>
        <li>Coccyx</li>
        <li>Femur</li>
        <li>Patella</li>
    </ul>
</div>
  <script>
// Accepted answers for each label box
const acceptedAnswers = {
    "cranium": ["cranium", "skull"],
    "mandible": ["mandible", "jaw", "jawbone"],
    "acromion": ["acromion"],
    "humerus": ["humerus"],
    "clavicle": ["clavicle", "collarbone"],
    "scapula": ["scapula", "shoulder blade"],
    "radius": ["radius"],
    "ulna": ["ulna"],
    "ribs": ["ribs", "rib cage"],
    "sternum": ["sternum", "breastbone"],
    "cervical": ["cervical vertebrae", "cervical spine", "c spine"],
    "thoracic": ["thoracic vertebrae", "thoracic spine", "t spine"],
    "lumbar": ["lumbar vertebrae", "lumbar spine", "l spine"],
    "coxal": ["coxal bone", "hip bone", "pelvic bone"],
    "coccyx": ["coccyx", "tailbone"],
    "femur": ["femur", "thigh bone"],
    "patella": ["patella", "kneecap"]
};

// Function to check a single input box
function checkAnswer(inputElement) {
    const id = inputElement.id;
    const userInput = inputElement.value.trim().toLowerCase();

    // Clear previous feedback
    inputElement.classList.remove("correct", "incorrect");

    if (!acceptedAnswers[id]) return;

    // Check if the input matches any accepted answer
    const isCorrect = acceptedAnswers[id].some(
        answer => answer.toLowerCase() === userInput
    );

    if (isCorrect) {
        inputElement.classList.add("correct");
        inputElement.disabled = true; // lock correct answers
    } else {
        inputElement.classList.add("incorrect");
    }
}

// Check all answers at once
function checkAllAnswers() {
    document.querySelectorAll(".label-box").forEach(box => {
        checkAnswer(box);
    });
}

// Button listener
document.getElementById("check-all").addEventListener("click", checkAllAnswers);

// Loading screen fade-out
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("loading-screen").classList.add("hidden");
    }, 2000);
});
</script>

</body>
  <a href="index.html" id="terminal-link">
    <button id="terminal-button">TERMINAL</button>
</a>

</html>
