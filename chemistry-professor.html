<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROFESSOR ISOTOPE | MEDICAL SUITE</title>
    <style>
        :root {
            --isotope-green: #39FF14;
            --clinical-blue: #2196f3;
            --bg-black: #000000;
        }

        /* Force the body to be exactly the height of the device screen */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--bg-black);
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            background: var(--bg-black);
            color: var(--isotope-green);
            text-align: center;
            padding-top: env(safe-area-inset-top, 44px); 
            padding-bottom: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1.5px;
            border-bottom: 1px solid #1a3311;
            text-transform: uppercase;
            flex-shrink: 0; /* Prevents header from squishing */
        }

        .status-bar span {
            color: var(--clinical-blue);
        }

        /* The container takes all remaining vertical space */
        #mcontext {
            flex-grow: 1;
            width: 100%;
            position: relative;
            background: var(--bg-black);
        }

        /* This targets the Machaao injected elements specifically */
        #mcontext iframe, 
        .machaao-embed-container, 
        #webchat {
            height: 100% !important;
            width: 100% !important;
            position: absolute !important;
            top: 0;
            left: 0;
            border: none !important;
        }
    </style>
</head>
<body>

    <div class="status-bar">
        ISOTOPE_MD // <span>BIO_CHEM_SECTOR_7</span> // v1.0
    </div>

    <div id="mcontext">
        <script 
            mode="embed" 
            isolate="true" 
            themecolor="#39FF14" 
            header="off" 
            accentcolor="#000000" 
            textcolor="white" 
            id="webchat" 
            src="https://cdn.machaao.com/prod/web/js/embed.js" 
            type="text/javascript" 
            mkey="NWJkOTUwYTAtMzM2OC0xMWYxLWJjNzItNmI0NzA5YzU5MDMx">
        </script>
    </div>

</body>
</html>
