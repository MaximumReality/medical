<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#fff}svg{max-width:100%;height:auto}</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <style>
    .benzene-ring {
      fill: none;
      stroke: #e8e4dc;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .bond {
      stroke: #e8e4dc;
      stroke-width: 2.5;
      stroke-linecap: round;
    }
    .oh-bond {
      stroke: #4ab8c8;
      stroke-width: 2.5;
      stroke-linecap: round;
    }
    .isopropyl-bond {
      stroke: #e8a94a;
      stroke-width: 2.5;
      stroke-linecap: round;
    }
    .atom-text {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 20px;
      font-weight: 600;
      fill: #e8e4dc;
      text-anchor: middle;
      dominant-baseline: central;
    }
    .oh-text {
      fill: #4ab8c8;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 20px;
      font-weight: 600;
      text-anchor: middle;
      dominant-baseline: central;
    }
    .isopropyl-text {
      fill: #e8a94a;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 18px;
      font-weight: 500;
      text-anchor: middle;
      dominant-baseline: central;
    }
    .label-text {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      fill: #b8b4ac;
      text-anchor: start;
    }
    .label-text-highlight {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      fill: #4ab8c8;
      font-weight: 600;
      text-anchor: start;
    }
    .callout {
      fill: none;
      stroke: #6a6a6a;
      stroke-width: 1.5;
      stroke-dasharray: 4 3;
    }
    .highlight-circle {
      fill: none;
      stroke: #4ab8c8;
      stroke-width: 2;
      stroke-dasharray: 3 3;
    }
  </style>
  
  <g transform="translate(400,300)">
    <!-- Benzene ring hexagon centered at 0,0 with radius 80 -->
    <!-- C1: 0,-80  top -->
    <!-- C2: 69.3,-40  top right -->
    <!-- C3: 69.3,40  bottom right -->
    <!-- C4: 0,80  bottom -->
    <!-- C5: -69.3,40  bottom left -->
    <!-- C6: -69.3,-40  top left -->
    
    <!-- Outer hexagon -->
    <polygon class="benzene-ring" points="0,-80 69.3,-40 69.3,40 0,80 -69.3,40 -69.3,-40"/>
    
    <!-- Alternating double bonds: C1=C2, C3=C4, C5=C6 -->
    <line class="benzene-ring" x1="6.9" y1="-73" x2="62.4" y2="-40"/>
    <line class="benzene-ring" x1="62.4" y1="40" x2="6.9" y2="73"/>
    <line class="benzene-ring" x1="-62.4" y1="40" x2="-6.9" y2="73"/>
    
    <!-- C1 - OH group -->
    <line class="oh-bond" x1="0" y1="-80" x2="0" y2="-125"/>
    <text class="oh-text" x="0" y="-147">OH</text>
    
    <!-- C2 - Isopropyl -->
    <line class="isopropyl-bond" x1="69.3" y1="-40" x2="105" y2="-60"/>
    <line class="isopropyl-bond" x1="105" y1="-60" x2="85" y2="-95"/>
    <line class="isopropyl-bond" x1="105" y1="-60" x2="140" y2="-70"/>
    <text class="isopropyl-text" x="105" y="-53">CH</text>
    <text class="isopropyl-text" x="72" y="-102">CH<tspan baseline-shift="sub" font-size="14">3</tspan></text>
    <text class="isopropyl-text" x="153" y="-77">CH<tspan baseline-shift="sub" font-size="14">3</tspan></text>
    
    <!-- C6 - Isopropyl -->
    <line class="isopropyl-bond" x1="-69.3" y1="-40" x2="-105" y2="-60"/>
    <line class="isopropyl-bond" x1="-105" y1="-60" x2="-85" y2="-95"/>
    <line class="isopropyl-bond" x1="-105" y1="-60" x2="-140" y2="-70"/>
    <text class="isopropyl-text" x="-105" y="-53">CH</text>
    <text class="isopropyl-text" x="-72" y="-102">CH<tspan baseline-shift="sub" font-size="14">3</tspan></text>
    <text class="isopropyl-text" x="-153" y="-77">CH<tspan baseline-shift="sub" font-size="14">3</tspan></text>
    
    <!-- Hydrogens on C3, C4, C5 -->
    <line class="bond" x1="69.3" y1="40" x2="102" y2="60"/>
    <text class="atom-text" x="108" y="65">H</text>
    
    <line class="bond" x1="0" y1="80" x2="0" y2="115"/>
    <text class="atom-text" x="0" y="122">H</text>
    
    <line class="bond" x1="-69.3" y1="40" x2="-102" y2="60"/>
    <text class="atom-text" x="-108" y="65">H</text>
  </g>
  
  <!-- Labels -->
  <!-- OH Label with highlight circle -->
  <circle class="highlight-circle" cx="400" cy="153" r="28"/>
  <line class="callout" x1="420" y1="140" x2="470" y2="100"/>
  <text class="label-text-highlight" x="475" y="104">Alcohol / Phenol -OH</text>
  
  <!-- Benzene Ring Label -->
  <line class="callout" x1="350" y1="360" x2="310" y2="420"/>
  <text class="label-text" x="260" y="438">Benzene Ring</text>
  
  <!-- Title -->
  <text class="label-text" x="400" y="540" text-anchor="middle" font-size="18" fill="#e8e4dc">Propofol (2,6-Diisopropylphenol)</text>
</svg>
</body>
</html>
