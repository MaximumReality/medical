<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITANIUM BONES</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-green: #39ff14;
            --retro-red: #ff0055;
            --bg: #0a0a0a;
        }

        html, body {
            height: 100%;
            overflow: hidden; 
            position: fixed;
            width: 100%;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            color: white;
            font-family: 'Courier New', monospace;
        }

        #game-header {
            height: 50px;
            border-bottom: 2px solid var(--retro-red);
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            flex-shrink: 0;
        }

        #skeleton-container {
            position: relative;
            width: 100vw;
            max-width: 420px;
            margin: 0 auto;
            flex-shrink: 0;
        }

        #skeleton-image {
            width: 100%;
            display: block;
            pointer-events: none;
        }

        /* The Word Bank area at the bottom */
        #sticker-bank {
            flex-grow: 1;
            background: #111;
            border-top: 2px solid #333;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 20px;
            justify-content: center;
            align-content: flex-start;
            overflow-y: auto;
        }

        .label-sticker {
            padding: 8px 12px;
            background: var(--neon-blue);
            color: black;
            font-weight: bold;
            font-size: 11px;
            border-radius: 4px;
            touch-action: none;
            z-index: 3000;
            white-space: nowrap;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #005f73;
        }

        /* When dragging or locked, they need centering */
        .active-label {
            position: absolute;
            transform: translate(-50%, -50%);
        }

        .locked {
            background: var(--neon-green) !important;
            box-shadow: 0 0 15px var(--neon-green);
            pointer-events: none;
        }

        /* When sitting in the bank */
        .static {
            position: relative !important;
            transform: none !important;
        }
    </style>
</head>
<body>

    <div id="game-header">
        <div style="color: var(--neon-green);">REANIMATED: <span id="count">0</span>/17</div>
    </div>

    <div id="skeleton-container">
        <img src="skeleton.JPG" id="skeleton-image">
    </div>

    <div id="sticker-bank">
        </div>

<script>
    const config = {
        "cervical": { top: "26.9%", left: "33.9%" },
        "patella": { top: "79.1%", left: "52.1%" },
        "femur": { top: "68.1%", left: "34.6%" },
        "coccyx": { top: "56.6%", left: "43.4%" },
        "radius": { top: "53.3%", left: "71.6%" },
        "coxal": { top: "53.5%", left: "53.3%" },
        "lumbar": { top: "50.2%", left: "37.7%" },
        "thoracic": { top: "43.1%", left: "35.1%" },
        "ribs": { top: "39.5%", left: "54.5%" },
        "ulna": { top: "54.3%", left: "27.7%" },
        "humerus": { top: "38.7%", left: "25.6%" },
        "clavicle": { top: "28.8%", left: "53.8%" },
        "scapula": { top: "31.9%", left: "55.0%" },
        "sternum": { top: "33.0%", left: "43.1%" },
        "mandible": { top: "21.0%", left: "31.5%" },
        "acromion": { top: "29.2%", left: "27.7%" },
        "cranium": { top: "15.3%", left: "43.1%" }
    };

    const bank = document.getElementById('sticker-bank');
    const container = document.getElementById('skeleton-container');
    const counter = document.getElementById('count');
    let solvedCount = 0;

    // Initialization
    window.onload = () => {
        Object.keys(config).forEach(id => {
            const div = document.createElement('div');
            div.className = 'label-sticker static';
            div.innerText = id.toUpperCase();
            bank.appendChild(div);

            div.addEventListener('touchstart', (e) => {
                div.classList.remove('static');
                div.classList.add('active-label');
                container.appendChild(div);
            }, {passive: true});

            div.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.targetTouches[0];
                const rect = container.getBoundingClientRect();
                
                let x = ((touch.pageX - rect.left) / rect.width * 100);
                let y = ((touch.pageY - rect.top) / rect.height * 100);
                
                div.style.left = x + '%';
                div.style.top = y + '%';
            }, {passive: false});

            div.addEventListener('touchend', (e) => {
                const touch = e.changedTouches[0];
                const rect = container.getBoundingClientRect();
                let fx = ((touch.pageX - rect.left) / rect.width * 100);
                let fy = ((touch.pageY - rect.top) / rect.height * 100);

                const target = config[id];
                if (Math.abs(fx - parseFloat(target.left)) < 8 && Math.abs(fy - parseFloat(target.top)) < 8) {
                    div.style.left = target.left;
                    div.style.top = target.top;
                    div.classList.add('locked');
                    solvedCount++;
                    counter.innerText = solvedCount;
                } else {
                    div.classList.remove('active-label');
                    div.classList.add('static');
                    bank.appendChild(div);
                }
            });
        });
    };
</script>
</body>
</html>
