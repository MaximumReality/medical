<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CURSED BONES: TRUE WIDTH ARCADE</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-green: #39ff14;
            --retro-red: #ff0055;
            --bg: #0a0a0a;
        }

        /* 1. LOCK THE SCREEN (Arcade Cabinet feel) */
        html, body {
            height: 100%;
            overflow: hidden; 
            position: fixed;
            width: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        #game-header {
            width: 100%;
            height: 60px;
            background: #111;
            border-bottom: 2px solid var(--retro-red);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 2000;
        }

        /* 2. THE MAIN STAGE: Now a Layered Container */
        #main-stage {
            position: relative;
            width: 100vw;
            height: calc(100vh - 60px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* THE SKELETON (Now full width, floating behind) */
        #skeleton-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 100%;
            z-index: 10; /* Lower than sidebars */
        }

        #skeleton-image {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }

        /* 3. THE SIDEBARS (Floating OVER Layer 1) */
        .side-bank {
            position: absolute;
            top: 0;
            width: 25%; /* Slightly wider for easier grabbing */
            height: 100%;
            background: transparent; /* Invisible so background shows */
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px 5px;
            z-index: 100; /* Floating above the skeleton layer */
            overflow-y: auto; /* Just in case list gets too long */
        }

        #bank-left { left: 0; }
        #bank-right { right: 0; }

        /* LABEL STYLING */
        .label-sticker {
            padding: 8px 10px;
            background: var(--neon-blue);
            color: black;
            font-weight: bold;
            font-size: 10px;
            border-radius: 4px;
            touch-action: none;
            z-index: 200;
            text-align: center;
            text-transform: uppercase;
            white-space: nowrap;
            cursor: grab;
        }

        .label-sticker.locked {
            background: var(--neon-green) !important;
            box-shadow: 0 0 15px var(--neon-green);
            pointer-events: none;
        }

        /* THE STATIC CLASS FOR SIDEBAR LISTING */
        .static { 
            position: relative !important; 
            top: auto !important; 
            left: auto !important; 
            width: 90%; 
            margin: 0 auto; 
            cursor: pointer;
        }

        /* WIN SCREEN (unchanged) */
        #win-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
    </style>
</head>
<body>

    <div id="game-header">
        <div style="color: var(--neon-blue);">REANIMATION IN PROGRESS</div>
        <div id="progress">Bones: <span id="count">0</span>/17</div>
    </div>

    <div id="main-stage">
        <div id="skeleton-wrapper">
            <img src="skeleton.JPG" id="skeleton-image">
        </div>

        <div id="bank-left" class="side-bank"></div>
        <div id="bank-right" class="side-bank"></div>
    </div>

    <div id="win-overlay">
        <h1 style="color: var(--neon-green); font-size: 40px; text-align: center;">LEVEL<br>COMPLETE</h1>
        <button onclick="location.reload()" style="padding: 10px 20px; background: black; color: white; border: 1px solid white; font-family: inherit; font-size: 16px;">RESTART</button>
    </div>

<script>
    // Your exact coordinates remain perfect!
    const config = {
        "cervical": { top: "26.9%", left: "33.9%", side: "left" },
        "patella": { top: "79.1%", left: "52.1%", side: "right" },
        "femur": { top: "68.1%", left: "34.6%", side: "left" },
        "coccyx": { top: "56.6%", left: "43.4%", side: "right" },
        "radius": { top: "53.3%", left: "71.6%", side: "left" },
        "coxal": { top: "53.5%", left: "53.3%", side: "right" },
        "lumbar": { top: "50.2%", left: "37.7%", side: "left" },
        "thoracic": { top: "43.1%", left: "35.1%", side: "right" },
        "ribs": { top: "39.5%", left: "54.5%", side: "left" },
        "ulna": { top: "54.3%", left: "27.7%", side: "right" },
        "humerus": { top: "38.7%", left: "25.6%", side: "left" },
        "clavicle": { top: "28.8%", left: "53.8%", side: "right" },
        "scapula": { top: "31.9%", left: "55.0%", side: "left" },
        "sternum": { top: "33.0%", left: "43.1%", side: "right" },
        "mandible": { top: "21.0%", left: "31.5%", side: "left" },
        "acromion": { top: "29.2%", left: "27.7%", side: "right" },
        "cranium": { top: "15.3%", left: "43.1%", side: "left" }
    };

    const leftBank = document.getElementById('bank-left');
    const rightBank = document.getElementById('bank-right');
    const container = document.getElementById('skeleton-wrapper');
    const countDisplay = document.getElementById('count');
    let solvedCount = 0;

    Object.keys(config).forEach(id => {
        const div = document.createElement('div');
        div.id = id;
        div.className = 'label-sticker static';
        div.innerText = id.replace('_', ' ');
        
        // Initial sorting into banks
        if(config[id].side === "left") leftBank.appendChild(div);
        else rightBank.appendChild(div);

        // TOUCH HANDLING (Optimized for floating layers)
        div.addEventListener('touchstart', (e) => {
            div.classList.remove('static');
            div.style.position = 'absolute';
            div.style.zIndex = "1000";
        });

        div.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.targetTouches[0];
            const rect = container.getBoundingClientRect();
            // Critical calculation relative to the skeleton container, not the sidebar
            let x = ((touch.pageX - rect.left) / rect.width * 100);
            let y = ((touch.pageY - rect.top) / rect.height * 100);
            div.style.left = x + '%';
            div.style.top = y + '%';
        }, {passive: false});

        div.addEventListener('touchend', (e) => {
            const touch = e.changedTouches[0];
            const rect = container.getBoundingClientRect();
            let finalX = ((touch.pageX - rect.left) / rect.width * 100);
            let finalY = ((touch.pageY - rect.top) / rect.height * 100);

            const target = config[div.id];
            const tX = parseFloat(target.left);
            const tY = parseFloat(target.top);

            // Buffer zone for snapping
            if (Math.abs(finalX - tX) < 5 && Math.abs(finalY - tY) < 5) {
                // SNAP SUCCESS!
                div.style.left = target.left;
                div.style.top = target.top;
                div.classList.add('locked');
                solvedCount++;
                countDisplay.innerText = solvedCount;
                if (solvedCount === 17) document.getElementById('win-overlay').style.display = 'flex';
            } else {
                // DROP MISS - Return to correct sidebar bank
                div.classList.add('static');
                if(config[div.id].side === "left") leftBank.appendChild(div);
                else rightBank.appendChild(div);
            }
        });
    });
</script>
</body>
</html>
