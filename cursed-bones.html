<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CURSED BONES: ARCADE EDITION</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-green: #39ff14;
            --retro-red: #ff0055;
            --bg: #0a0a0a;
        }

        html, body {
            height: 100%;
            overflow: hidden; 
            position: fixed;
            width: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 0;
        }

        #game-header {
            width: 100%;
            height: 60px;
            background: #111;
            border-bottom: 2px solid var(--retro-red);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 2000;
        }

        #main-stage {
            display: flex;
            width: 100vw;
            height: calc(100vh - 60px);
        }

        .side-bank {
            width: 22%;
            background: #111;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px 5px;
            overflow-y: auto;
            border: 1px solid #333;
            z-index: 10; /* Lower than the skeleton area */
        }

        #game-container {
            position: relative;
            width: 56%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #050505;
            z-index: 20; /* Higher than banks */
        }

        #skeleton-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
        }

        #skeleton-image {
            width: 100%;
            display: block;
            pointer-events: none;
        }

        .label-sticker {
            padding: 6px;
            background: var(--neon-blue);
            color: black;
            font-weight: bold;
            font-size: 9px;
            border-radius: 3px;
            touch-action: none;
            z-index: 1000 !important; /* Force to the very top */
            text-align: center;
            text-transform: uppercase;
            box-shadow: 2px 2px 0px #005f73;
        }

        .label-sticker.locked {
            background: var(--neon-green) !important;
            box-shadow: 0 0 10px var(--neon-green);
            pointer-events: none;
        }

        .static { position: relative !important; width: 90%; margin: 0 auto; }

        #win-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5000;
        }
    </style>
</head>
<body>

    <div id="game-header">
        <div style="color: var(--neon-blue); font-size: 12px;">SYSTEM: ACTIVE</div>
        <div id="progress">Bones: <span id="count">0</span>/17</div>
    </div>

    <div id="main-stage">
        <div id="bank-left" class="side-bank"></div>

        <div id="game-container">
            <div id="skeleton-wrapper">
                <img src="skeleton.JPG" id="skeleton-image">
                </div>
        </div>

        <div id="bank-right" class="side-bank"></div>
    </div>

    <div id="win-overlay">
        <h1 style="color: var(--neon-green); font-size: 40px; text-align:center;">LEVEL<br>COMPLETE</h1>
        <button onclick="location.reload()" style="padding: 15px; background: black; color: white; border: 2px solid var(--retro-red); font-family: inherit;">RESTART</button>
    </div>

<script>
    const config = {
        "cervical": { top: "26.9%", left: "33.9%", side: "left" },
        "patella": { top: "79.1%", left: "52.1%", side: "right" },
        "femur": { top: "68.1%", left: "34.6%", side: "left" },
        "coccyx": { top: "56.6%", left: "43.4%", side: "right" },
        "radius": { top: "53.3%", left: "71.6%", side: "left" },
        "coxal": { top: "53.5%", left: "53.3%", side: "right" },
        "lumbar": { top: "50.2%", left: "37.7%", side: "left" },
        "thoracic": { top: "43.1%", left: "35.1%", side: "right" },
        "ribs": { top: "39.5%", left: "54.5%", side: "left" },
        "ulna": { top: "54.3%", left: "27.7%", side: "right" },
        "humerus": { top: "38.7%", left: "25.6%", side: "left" },
        "clavicle": { top: "28.8%", left: "53.8%", side: "right" },
        "scapula": { top: "31.9%", left: "55.0%", side: "left" },
        "sternum": { top: "33.0%", left: "43.1%", side: "right" },
        "mandible": { top: "21.0%", left: "31.5%", side: "left" },
        "acromion": { top: "29.2%", left: "27.7%", side: "right" },
        "cranium": { top: "15.3%", left: "43.1%", side: "left" }
    };

    const leftBank = document.getElementById('bank-left');
    const rightBank = document.getElementById('bank-right');
    const wrapper = document.getElementById('skeleton-wrapper');
    let solvedCount = 0;

    Object.keys(config).forEach(id => {
        const div = document.createElement('div');
        div.id = id;
        div.className = 'label-sticker static';
        div.innerText = id.replace('_', ' ');
        
        if(config[id].side === "left") leftBank.appendChild(div);
        else rightBank.appendChild(div);

        div.addEventListener('touchstart', (e) => {
            // PORTAL: Move the element to the skeleton-wrapper so it's on top
            div.classList.remove('static');
            div.style.position = 'absolute';
            wrapper.appendChild(div); 
        });

        div.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.targetTouches[0];
            const rect = wrapper.getBoundingClientRect();
            
            let x = ((touch.pageX - rect.left) / rect.width * 100);
            let y = ((touch.pageY - rect.top) / rect.height * 100);
            
            div.style.left = x + '%';
            div.style.top = y + '%';
        }, {passive: false});

        div.addEventListener('touchend', (e) => {
            const touch = e.changedTouches[0];
            const rect = wrapper.getBoundingClientRect();
            let finalX = ((touch.pageX - rect.left) / rect.width * 100);
            let finalY = ((touch.pageY - rect.top) / rect.height * 100);

            const target = config[div.id];
            const tX = parseFloat(target.left);
            const tY = parseFloat(target.top);

            // Precision check
            if (Math.abs(finalX - tX) < 6 && Math.abs(finalY - tY) < 6) {
                div.style.left = target.left;
                div.style.top = target.top;
                div.classList.add('locked');
                solvedCount++;
                document.getElementById('count').innerText = solvedCount;
                if (solvedCount === 17) document.getElementById('win-overlay').style.display = 'flex';
            } else {
                // RETURN: Move it back to its original bank
                div.classList.add('static');
                if(config[div.id].side === "left") leftBank.appendChild(div);
                else rightBank.appendChild(div);
            }
        });
    });
</script>
</body>
</html>
