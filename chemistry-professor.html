<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROFESSOR ISOTOPE | MEDICAL SUITE</title>
    <style>
        /* ISOTOPE THEME: RADIO-GLOW GREEN & CLINICAL BLUE */
        :root {
            --isotope-green: #39FF14;
            --clinical-blue: #2196f3;
            --bg-black: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-black);
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* Status Bar with Dynamic Island Support */
        .status-bar {
            background: var(--bg-black);
            color: var(--isotope-green);
            text-align: center;
            padding-top: env(safe-area-inset-top, 44px); 
            padding-bottom: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1.5px;
            border-bottom: 1px solid #1a3311;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(57, 255, 20, 0.15);
        }

        .status-bar span {
            color: var(--clinical-blue);
        }

        /* Container fills the iPhone screen */
        #mcontext {
            flex: 1;
            width: 100%;
            height: 100%;
            background: var(--bg-black);
        }

        /* Force the Machaao iframe to fill the container */
        #mcontext iframe {
            height: 100% !important;
            width: 100% !important;
            border: none;
        }
    </style>
</head>
<body>

    <div class="status-bar">
        ISOTOPE_MD // <span>BIO_CHEM_SECTOR_7</span> // v1.0
    </div>

    <div id="mcontext">
        <script 
            mode="embed" 
            isolate="true" 
            themecolor="#39FF14" 
            header="off" 
            accentcolor="#000000" 
            textcolor="white" 
            id="webchat" 
            src="https://cdn.machaao.com/prod/web/js/embed.js" 
            type="text/javascript" 
            mkey="NWJkOTUwYTAtMzM2OC0xMWYxLWJjNzItNmI0NzA5YzU5MDMx">
        </script>
    </div>

</body>
</html>
