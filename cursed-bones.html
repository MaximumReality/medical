<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CURSED BONES: BOTTOM BANK</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-green: #39ff14;
            --retro-red: #ff0055;
            --bg: #0a0a0a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Courier New', monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #game-header {
            height: 50px;
            background: #111;
            border-bottom: 2px solid var(--retro-red);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        /* MAIN AREA: Skeleton sits here */
        #game-container {
            flex-grow: 1;
            position: relative;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Keeps him near the top */
            padding-top: 10px;
        }

        #skeleton-wrapper {
            position: relative;
            width: 85vw; /* Fills the screen width better */
            max-width: 400px;
            line-height: 0;
        }

        #skeleton-image {
            width: 100%;
            display: block;
            pointer-events: none;
        }

        /* STICKER BANK: Back at the bottom */
        #sticker-bank {
            height: 180px; /* Space for your future additions! */
            background: #111;
            border-top: 2px solid #333;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 15px;
            justify-content: center;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .label-sticker {
            padding: 6px 10px;
            background: var(--neon-blue);
            color: black;
            font-weight: bold;
            font-size: 10px;
            border-radius: 3px;
            touch-action: none;
            z-index: 1000;
            text-transform: uppercase;
            /* Critical for alignment */
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }

        .static { position: relative !important; transform: none !important; top: auto !important; left: auto !important; }

        .label-sticker.locked {
            background: var(--neon-green) !important;
            box-shadow: 0 0 12px var(--neon-green);
            pointer-events: none;
            transform: translate(-50%, -50%) !important;
        }
    </style>
</head>
<body>

    <div id="game-header">
        <div>REANIMATED: <span id="count">0</span>/17</div>
    </div>

    <div id="game-container">
        <div id="skeleton-wrapper">
            <img src="skeleton.JPG" id="skeleton-image">
        </div>
    </div>

    <div id="sticker-bank"></div>

<script>
    const config = {
        "cervical": { top: "26.9%", left: "33.9%" },
        "patella": { top: "79.1%", left: "52.1%" },
        "femur": { top: "68.1%", left: "34.6%" },
        "coccyx": { top: "56.6%", left: "43.4%" },
        "radius": { top: "53.3%", left: "71.6%" },
        "coxal": { top: "53.5%", left: "53.3%" },
        "lumbar": { top: "50.2%", left: "37.7%" },
        "thoracic": { top: "43.1%", left: "35.1%" },
        "ribs": { top: "39.5%", left: "54.5%" },
        "ulna": { top: "54.3%", left: "27.7%" },
        "humerus": { top: "38.7%", left: "25.6%" },
        "clavicle": { top: "28.8%", left: "53.8%" },
        "scapula": { top: "31.9%", left: "55.0%" },
        "sternum": { top: "33.0%", left: "43.1%" },
        "mandible": { top: "21.0%", left: "31.5%" },
        "acromion": { top: "29.2%", left: "27.7%" },
        "cranium": { top: "15.3%", left: "43.1%" }
    };

    const bank = document.getElementById('sticker-bank');
    const wrapper = document.getElementById('skeleton-wrapper');
    let solvedCount = 0;

    Object.keys(config).forEach(id => {
        const div = document.createElement('div');
        div.className = 'label-sticker static';
        div.innerText = id;
        bank.appendChild(div);

        div.addEventListener('touchstart', (e) => {
            div.classList.remove('static');
            div.style.position = 'absolute';
            wrapper.appendChild(div);
        });

        div.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.targetTouches[0];
            const rect = wrapper.getBoundingClientRect();
            let x = ((touch.pageX - rect.left) / rect.width * 100);
            let y = ((touch.pageY - rect.top) / rect.height * 100);
            div.style.left = x + '%';
            div.style.top = y + '%';
        }, {passive: false});

        div.addEventListener('touchend', (e) => {
            const touch = e.changedTouches[0];
            const rect = wrapper.getBoundingClientRect();
            let fx = ((touch.pageX - rect.left) / rect.width * 100);
            let fy = ((touch.pageY - rect.top) / rect.height * 100);

            const target = config[id];
            if (Math.abs(fx - parseFloat(target.left)) < 6 && Math.abs(fy - parseFloat(target.top)) < 6) {
                div.style.left = target.left;
                div.style.top = target.top;
                div.classList.add('locked');
                solvedCount++;
                document.getElementById('count').innerText = solvedCount;
            } else {
                div.classList.add('static');
                bank.appendChild(div);
            }
        });
    });
</script>
</body>
</html>
