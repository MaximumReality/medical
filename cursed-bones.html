<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITANIUM BONES</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-green: #39ff14;
            --retro-red: #ff0055;
            --bg: #0a0a0a;
        }

        body {
            background-color: var(--bg);
            margin: 0;
            color: white;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #game-header {
            height: 50px;
            background: #111;
            border-bottom: 2px solid var(--retro-red);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        #skeleton-container {
            position: relative;
            width: 100vw;
            max-width: 420px;
            margin: 0 auto;
            flex-shrink: 0;
            line-height: 0; /* Kills the tiny gap under the image */
        }

        #skeleton-image {
            width: 100%;
            display: block;
            pointer-events: none;
        }

        #sticker-bank {
            flex-grow: 1;
            background: #111;
            border-top: 2px solid #333;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 20px;
            justify-content: center;
            overflow-y: auto;
        }

        .label-sticker {
            padding: 8px 12px;
            background: var(--neon-blue);
            color: black;
            font-weight: bold;
            font-size: 11px;
            border-radius: 4px;
            touch-action: none;
            z-index: 1000;
            text-transform: uppercase;
        }

        /* Essential for alignment */
        .dragging, .locked {
            position: absolute !important;
            transform: translate(-50%, -50%);
        }

        .locked {
            background: var(--neon-green) !important;
            box-shadow: 0 0 15px var(--neon-green);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="game-header">
        REANIMATED: <span id="count">0</span>/17
    </div>

    <div id="skeleton-container">
        <img src="skeleton.JPG" id="skeleton-image">
    </div>

    <div id="sticker-bank"></div>

<script>
    const config = {
        "cervical": { top: "26.9%", left: "33.9%" },
        "patella": { top: "79.1%", left: "52.1%" },
        "femur": { top: "68.1%", left: "34.6%" },
        "coccyx": { top: "56.6%", left: "43.4%" },
        "radius": { top: "53.3%", left: "71.6%" },
        "coxal": { top: "53.5%", left: "53.3%" },
        "lumbar": { top: "50.2%", left: "37.7%" },
        "thoracic": { top: "43.1%", left: "35.1%" },
        "ribs": { top: "39.5%", left: "54.5%" },
        "ulna": { top: "54.3%", left: "27.7%" },
        "humerus": { top: "38.7%", left: "25.6%" },
        "clavicle": { top: "28.8%", left: "53.8%" },
        "scapula": { top: "31.9%", left: "55.0%" },
        "sternum": { top: "33.0%", left: "43.1%" },
        "mandible": { top: "21.0%", left: "31.5%" },
        "acromion": { top: "29.2%", left: "27.7%" },
        "cranium": { top: "15.3%", left: "43.1%" }
    };

    const bank = document.getElementById('sticker-bank');
    const container = document.getElementById('skeleton-container');
    let solvedCount = 0;

    Object.keys(config).forEach(id => {
        const div = document.createElement('div');
        div.className = 'label-sticker';
        div.innerText = id.toUpperCase();
        div.id = id;
        bank.appendChild(div);

        div.addEventListener('touchstart', function(e) {
            this.classList.add('dragging');
            container.appendChild(this);
        });

        div.addEventListener('touchmove', function(e) {
            e.preventDefault();
            const touch = e.targetTouches[0];
            const rect = container.getBoundingClientRect();
            
            // MATH CHECK: pageX minus the actual left-edge of the skeleton
            let x = ((touch.pageX - rect.left) / rect.width * 100);
            let y = ((touch.pageY - rect.top) / rect.height * 100);
            
            this.style.left = x + '%';
            this.style.top = y + '%';
        }, {passive: false});

        div.addEventListener('touchend', function(e) {
            const touch = e.changedTouches[0];
            const rect = container.getBoundingClientRect();
            let fx = ((touch.pageX - rect.left) / rect.width * 100);
            let fy = ((touch.pageY - rect.top) / rect.height * 100);

            const target = config[this.id];
            // If Cranium is landing at the nose, we need to nudge these targets!
            if (Math.abs(fx - parseFloat(target.left)) < 8 && Math.abs(fy - parseFloat(target.top)) < 8) {
                this.style.left = target.left;
                this.style.top = target.top;
                this.classList.add('locked');
                this.classList.remove('dragging');
                solvedCount++;
                document.getElementById('count').innerText = solvedCount;
            } else {
                this.classList.remove('dragging');
                this.style.left = 'auto';
                this.style.top = 'auto';
                bank.appendChild(this);
            }
        });
    });
</script>
</body>
</html>
