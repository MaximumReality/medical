    <style>
        :root {
            --neon-green: #39ff14;
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --retro-purple: #2b0040;
            --dark-bg: #1a1a1a;
        }

        body {
            background-color: var(--dark-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            overflow: hidden;
        }

        #arcade-cabinet {
            position: relative;
            width: 95vw;
            max-width: 520px;
            height: 90dvh;
            background: #111;
            border: 6px solid #333;
            border-radius: 20px;
            box-shadow: 0 0 30px var(--neon-pink);
            display: flex;
            flex-direction: column;
        }

        #arcade-header {
            height: 40px;
            background: #000;
            border-bottom: 2px solid var(--neon-blue);
            color: var(--neon-green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        .blink {
            color: #ff0033;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.2; }
        }

        #screen-container {
            position: relative;
            flex: 1;
            background: var(--retro-purple);
            margin: 10px;
            border: 4px solid #222;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* CRT Scanline Effect */
        #screen-container::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 5;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
        }

        #ui-layer {
            flex: 1;
            padding: 10px;
            text-align: center;
            z-index: 10;
        }

        /* FIX: score counter now lives inside ui-layer flow, no absolute positioning conflict */
        #score-counter {
            color: var(--neon-blue);
            font-weight: bold;
            font-size: 0.85rem;
            text-align: right;
            padding: 4px 10px 0;
        }

        #question-display {
            font-size: 1.1rem;
            color: var(--neon-green);
            text-shadow: 2px 2px #000;
            margin-bottom: 15px;
            min-height: 60px;
        }

        #options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .arcade-btn {
            background: #333;
            color: white;
            border: 3px solid #555;
            padding: 10px 5px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 3px 3px 0px #000;
            transition: 0.1s;
        }

        .arcade-btn:hover { background: #444; border-color: var(--neon-blue); }
        .arcade-btn:active { transform: translate(2px, 2px); box-shadow: none; background: var(--neon-green); color: black; }

        #rationale-overlay {
            display: none;
            position: absolute;
            top: 10%; left: 5%;
            width: 80%;
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid var(--neon-pink);
            padding: 20px;
            z-index: 100;
            color: white;
        }

        .continue-btn {
            width: 100%;
            margin-top: 15px;
            background: var(--neon-green) !important;
            color: black !important;
        }

        #footer-nav {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 200;
        }

        .nav-btn {
            text-decoration: none;
            background: #111;
            color: var(--neon-green);
            border: 2px solid var(--neon-blue);
            padding: 8px 12px;
            font-size: 0.7rem;
            font-family: 'Courier New', monospace;
            box-shadow: 2px 2px 0 #000;
            transition: 0.15s;
        }

        .nav-btn:hover { background: var(--neon-blue); color: black; }
        .nav-btn:active { transform: translate(2px,2px); box-shadow: none; }

        <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<body>

        <a href="https://maximumreality.xyz" class="nav-btn" onclick="playExit(event, this.href)">🏙️ RETURN TO REALITY</a>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const questionEl = document.getElementById('question-display');
    const optionsEl = document.getElementById('options');
    const scoreEl = document.getElementById('score-counter');
    const overlay = document.getElementById('rationale-overlay');
    const startSound = document.getElementById('startSound');
    const exitSound = document.getElementById('exitSound');
    const winSound = document.getElementById('winSound');

    canvas.width = 600;
    canvas.height = 300;

    let hasStarted = false;
    let score = 0;
    let currentQA = {};
    let timeLeft = 100;
    let timerInterval;
    let flickerInterval; // FIX: track flicker so it can be cleared on restart
    const TIME_LIMIT = 20;

    const nclexData = [
        // --- PHARMACOLOGY ---
        { q: "Antidote for Magnesium Sulfate?", a: "Calcium Gluconate", wrong: ["Vitamin K", "Protamine Sulfate", "Atropine"], rationale: "Mag-Sulfate is for pre-eclampsia. If they lose Deep Tendon Reflexes, reach for the Calcium Glue-conate!" },
        { q: "Antidote for Heparin?", a: "Protamine Sulfate", wrong: ["Vitamin K", "Acetylcysteine", "Flumazenil"], rationale: "Heparin works fast, Protamine Sulfate stops it fast. (He-Pro duo!)" },
        { q: "Side effect of ACE Inhibitors?", a: "Dry Cough", wrong: ["Tinnitus", "Orange Urine", "Constipation"], rationale: "ACE Inhibitors (the -prils) can cause a dry, hacking cough due to bradykinin." },
        { q: "Therapeutic Lithium Level?", a: "0.6 - 1.2 mEq/L", wrong: ["2.0 - 3.5", "0.1 - 0.5", "5.0 - 10.0"], rationale: "Lithium has a narrow window. >1.5 is toxic. Keep 'em hydrated!" },
        { q: "Naloxone (Narcan) reverses what?", a: "Opioids", wrong: ["Benzos", "Alcohol", "Warfarin"], rationale: "Narcan is the 'wake up' call for respiratory depression caused by Opioids." },
        { q: "Digoxin toxicity sign?", a: "Yellow-Green Halos", wrong: ["Dry Mouth", "Hearing loss", "Hyperactivity"], rationale: "Visual changes and Nausea/Vomiting are classic signs of 'Dig' toxicity." },
        { q: "Antidote for Warfarin?", a: "Vitamin K", wrong: ["Protamine", "Narcan", "Glucagon"], rationale: "Warfarin (Coumadin) takes days to work; Vit K is the brake pedal." },
        { q: "Antidote for benzodiazepine overdose?", a: "Flumazenil", wrong: ["Naloxone", "Vitamin K", "Atropine"], rationale: "Flumazenil reverses benzodiazepine effects." },
        { q: "Antidote for Acetaminophen?", a: "Acetylcysteine", wrong: ["Vitamin K", "Narcan", "Atropine"], rationale: "Mucomyst saves the liver from Tylenol." },
        { q: "When to give Rapid Insulin?", a: "15 min before meal", wrong: ["Bedtime", "2 hrs after", "Fast"], rationale: "Don't shoot if the food isn't there!" },
        { q: "Rifampin side effect?", a: "Orange body fluids", wrong: ["Hearing loss", "Neuropathy", "Diarrhea"], rationale: "Tears/Urine turn orange. Harmless but scary!" },
        { q: "Status Epilepticus drug?", a: "Lorazepam (Ativan)", wrong: ["Phenytoin", "Valproic Acid", "Gabapentin"], rationale: "Benzos first to stop the seizing now!" },
        { q: "Medication for acute asthma attack?", a: "Albuterol", wrong: ["Montelukast", "Fluticasone", "Theophylline"], rationale: "Albuterol is a fast-acting bronchodilator for acute symptoms." },
        { q: "Drug for rapid-sequence intubation?", a: "Succinylcholine", wrong: ["Atropine", "Epinephrine", "Furosemide"], rationale: "Succinylcholine is a fast-acting paralytic used in RSI." },
        { q: "Medication for heart failure?", a: "Furosemide", wrong: ["Metformin", "Ibuprofen", "Acetaminophen"], rationale: "Furosemide is a loop diuretic used to reduce fluid overload." },
        { q: "Medication for Type 1 diabetes?", a: "Insulin", wrong: ["Metformin", "Glipizide", "Acarbose"], rationale: "Type 1 diabetics cannot produce insulin and need exogenous insulin." },
        { q: "Safe pain med for pregnant patient?", a: "Acetaminophen", wrong: ["Ibuprofen", "Aspirin", "Naproxen"], rationale: "Acetaminophen is considered safe in pregnancy; NSAIDs are not recommended." },

        // --- LABS ---
        { q: "Normal Potassium (K+) range?", a: "3.5 - 5.0 mEq/L", wrong: ["1.5 - 2.5", "7.0 - 9.0", "135 - 145"], rationale: "K+ affects the heart. High or Low = EKG changes!" },
        { q: "Normal Sodium (Na+) range?", a: "135 - 145 mEq/L", wrong: ["110 - 120", "150 - 160", "3.5 - 5.0"], rationale: "Sodium = Neuro. Think Seizures if this is out of whack!" },
        { q: "Normal pH of Blood?", a: "7.35 - 7.45", wrong: ["7.00 - 7.15", "7.50 - 7.65", "6.80 - 7.00"], rationale: "Lower than 7.35 is Acidic; Higher than 7.45 is Alkalotic." },
        { q: "Normal Creatinine level?", a: "0.6 - 1.2 mg/dL", wrong: ["3.0 - 5.0", "0.1 - 0.3", "10 - 20"], rationale: "Creatinine is the best indicator of Kidney function." },
        { q: "Normal WBC count?", a: "5,000 - 10,000/mm³", wrong: ["1k - 2k", "20k - 30k", "100 - 500"], rationale: "Leukocytosis (high WBC) usually means infection." },
        { q: "Normal Calcium level?", a: "9.0 - 10.5 mg/dL", wrong: ["1.0 - 2.0", "15 - 20", "4.0 - 5.0"], rationale: "Think: 'Call 9-11' (9 to 10.5) for Calcium!" },
        { q: "Normal Platelet count?", a: "150k - 400k", wrong: ["5k - 10k", "500k - 1M", "50k - 100k"], rationale: "Below 150k is Thrombocytopenia (Bleeding risk!)." },
        { q: "Normal HbA1c?", a: "4% - 6%", wrong: ["8% - 10%", "1% - 2%", "12% - 15%"], rationale: "Shows 3-month average of blood sugar." },
        { q: "Normal PT (Non-Warfarin)?", a: "11 - 12.5 seconds", wrong: ["30-45s", "5-8s", "60-90s"], rationale: "PT/INR is for Warfarin." },
        { q: "Normal Phosphorus?", a: "3.0 - 4.5 mg/dL", wrong: ["1.0", "5.0", "0.5"], rationale: "Inverse to Calcium." },
        { q: "Therapeutic PT/INR range for warfarin?", a: "2.0 - 3.0", wrong: ["1.0 - 1.5", "3.5 - 4.5", "0.5 - 1.0"], rationale: "Maintaining INR in 2–3 reduces risk of clot without causing bleeding." },
        { q: "Target Therapeutic Digoxin Level?", a: "0.5 - 2.0 ng/mL", wrong: ["3.5 - 5.0", "10 - 20", "0.1 - 0.4"], rationale: "Dig has a narrow window. Watch for yellow halos!" },
        { q: "Normal fasting blood glucose?", a: "70-99 mg/dL", wrong: ["40-60", "100-125", "126-150"], rationale: "Fasting glucose should be under 100 mg/dL to be normal." },
        { q: "Normal adult hemoglobin?", a: "12-16 g/dL (female) / 14-18 g/dL (male)", wrong: ["8-10", "20-25", "5-8"], rationale: "Hemoglobin reflects oxygen-carrying capacity." },
        { q: "Lab test for liver function?", a: "ALT & AST", wrong: ["BUN & Creatinine", "CBC", "PTT"], rationale: "ALT and AST are enzymes released when liver cells are damaged." },
        { q: "Which lab indicates kidney injury?", a: "Elevated creatinine", wrong: ["Low potassium", "High sodium", "Elevated glucose"], rationale: "Creatinine is the most sensitive marker for kidney function." },
        { q: "Which electrolyte imbalance causes peaked T-waves?", a: "Hyperkalemia", wrong: ["Hypokalemia", "Hypernatremia", "Hypocalcemia"], rationale: "High potassium affects cardiac conduction, seen as peaked T-waves." },
        { q: "Normal adult BP range?", a: "90/60 - 120/80 mmHg", wrong: ["140/90 - 160/100", "60/40 - 70/50", "130/100 - 150/110"], rationale: "This is the standard normal BP range for adults." },
        { q: "Normal adult respiratory rate?", a: "12-20 breaths/min", wrong: ["8-10", "20-28", "25-35"], rationale: "12–20 is the standard normal adult respiratory rate." },
        { q: "Normal adult pulse rate?", a: "60-100 bpm", wrong: ["40-60", "100-120", "120-140"], rationale: "60–100 bpm is the standard resting heart rate for adults." },
        { q: "Normal adult body temperature?", a: "36-37.5°C (97-99.5°F)", wrong: ["35-36", "38-39", "37.5-39"], rationale: "This is the standard normal adult temperature range." },
        { q: "Normal oxygen saturation?", a: "95-100%", wrong: ["85-90%", "90-94%", "100-105%"], rationale: "95–100% indicates adequate oxygenation in healthy adults." },
        { q: "Normal newborn heart rate?", a: "120-160 bpm", wrong: ["100-110", "160-180", "80-100"], rationale: "Newborns have a higher heart rate than adults." },
        { q: "Normal pediatric heart rate (1-2 yrs)?", a: "80-130 bpm", wrong: ["60-80", "140-180", "50-70"], rationale: "Heart rate norms vary by age; toddlers are 80-130 bpm." },

        // --- MATERNITY ---
        { q: "Priority for Ruptured Membranes?", a: "Check Fetal Heart Rate", wrong: ["Check BP", "Start IV", "Call family"], rationale: "Check the baby first to rule out prolapsed cord!" },
        { q: "Position for Cord Prolapse?", a: "Knee-Chest", wrong: ["High Fowlers", "Left Lateral", "Supine"], rationale: "Knee-Chest uses gravity to keep the baby off the cord." },
        { q: "Nagele's Rule for EDD?", a: "-3 months +7 days", wrong: ["+3 months -7 days", "+9 months +10 days", "-1 month +1 day"], rationale: "Subtract 3 months, add 7 days to the first day of LMP." },
        { q: "Location of Fundus at 20 weeks?", a: "At the Umbilicus", wrong: ["At Pubic Bone", "At Xiphoid", "In Pelvis"], rationale: "20 weeks = Umbilicus (The halfway mark!)." },
        { q: "VEAL CHOP: 'V' (Variable) means?", a: "Cord Compression", wrong: ["Head Compression", "Placental Issue", "Oxygen"], rationale: "Variable Decels are bad! Turn the mom, give O2." },
        { q: "VEAL CHOP: 'L' (Late Decel) means?", a: "Placental Insufficiency", wrong: ["Head Compression", "Cord Compression", "Good Baby"], rationale: "Lates are bad. Give O2, Turn Mom, Stop Oxytocin!" },
        { q: "Positive sign of pregnancy?", a: "Fetal Heart Tones", wrong: ["Missed Period", "Morning Sickness", "Positive Test"], rationale: "Objective proof only (Heartbeat/Ultrasound)." },
        { q: "Sign of Preeclampsia?", a: "Proteinuria & HTN", wrong: ["Hypotension", "Low Reflexes", "Weight Loss"], rationale: "High BP + Protein in urine." },
        { q: "Sign of magnesium toxicity?", a: "Loss of deep tendon reflexes", wrong: ["Hypertension", "Tachycardia", "Hyperactive reflexes"], rationale: "Magnesium suppresses neuromuscular activity; check reflexes." },
        { q: "Priority for newborn with low Apgar?", a: "Resuscitation & oxygen", wrong: ["Feed immediately", "Call family", "Weigh baby"], rationale: "Immediate intervention is required for newborns with low Apgar scores." },

        // --- MED SURG / TRIAGE ---
        { q: "Rule of Nines: Entire Left Arm?", a: "9%", wrong: ["18%", "4.5%", "1%"], rationale: "Front is 4.5%, back is 4.5%. Total = 9%." },
        { q: "Sign of Hip Fracture?", a: "Shortened & External Rotation", wrong: ["Lengthened", "Cyanosis", "Internal Rotation"], rationale: "Affected leg looks shorter and toes point outward." },
        { q: "GCS score for Coma?", a: "8 or less", wrong: ["15", "10", "12"], rationale: "8, Intubate! A score of 3 is the lowest possible." },
        { q: "Cushing's Triad (High ICP)?", a: "Wide Pulse Pressure / Bradycardia", wrong: ["Tachycardia", "Narrow Pulse", "Rapid Breathing"], rationale: "Opposite of Shock: High BP, Slow Pulse, Slow Respirations." },
        { q: "Airborne Precautions require?", a: "N95 & Negative Pressure", wrong: ["Surgical Mask", "Door Open", "No Mask"], rationale: "MTV (Measles, TB, Varicella) need the N95." },
        { q: "Maslow's Priority?", a: "Oxygen/Physiological", wrong: ["Safety", "Love", "Self-Esteem"], rationale: "ABC's and Physiological needs (Air/Water) always come first." },
        { q: "Phlebitis Sign?", a: "Erythema & Warmth", wrong: ["Cool skin", "Pallor", "Numbness"], rationale: "Red, warm streaks mean vein inflammation." },
        { q: "Priority for Anaphylaxis?", a: "Epinephrine IM", wrong: ["Albuterol", "Normal Saline", "Benadryl"], rationale: "Epi is the only thing that stops the throat from closing!" },
        { q: "Donning PPE order?", a: "Gown, Mask, Goggles, Gloves", wrong: ["Gloves first", "Mask last", "Goggles first"], rationale: "Go from bottom up (Gown first) and end with Gloves." },
        { q: "Doffing PPE order?", a: "Gloves, Goggles, Gown, Mask", wrong: ["Mask first", "Gown last", "Goggles last"], rationale: "Remove dirtiest first (Gloves) and Mask last outside the room." },
        { q: "Restraint tie type?", a: "Quick-release knot", wrong: ["Square knot", "Double knot", "No knot"], rationale: "Must be able to untie quickly! Tie to bed frame, not rails." },
        { q: "Autonomy means?", a: "Patient's right to choose", wrong: ["Doing no harm", "Truth", "Fairness"], rationale: "Autonomy = Self-determination." },
        { q: "Non-maleficence means?", a: "Do no harm", wrong: ["Doing good", "Equality", "Right to choose"], rationale: "Non-maleficence = Do no harm." },
        { q: "Sign of NMS?", a: "Muscle Rigidity & High Fever", wrong: ["Low BP", "Hypothermia", "Hyperactivity"], rationale: "Neuroleptic Malignant Syndrome is a psych/pharma emergency!" },
        { q: "Primary prevention example?", a: "Immunizations", wrong: ["Screenings", "Rehab", "Physical Therapy"], rationale: "Primary = Prevention. Secondary = Screening." },
        { q: "Cardiac Tamponade sign?", a: "Muffled Heart Sounds", wrong: ["Loud Bruit", "Flat Veins", "Bradypnea"], rationale: "Beck's Triad: Muffled sounds, JVD, and Hypotension." },
        { q: "Position after Appendectomy?", a: "Semi-Fowlers", wrong: ["Prone", "Supine", "Lateral"], rationale: "Reduces strain and helps breathing." },
        { q: "Droplet Precautions need?", a: "Surgical Mask", wrong: ["N95", "Negative Pressure", "Gown only"], rationale: "Flu/Pertussis needs a mask within 3 feet." },
        { q: "Triage: Red Tag?", a: "Immediate / Life-Threatening", wrong: ["Dead", "Minor", "Delayed"], rationale: "Red = Can survive if treated right now." },
        { q: "Hypovolemic Shock priority?", a: "IV Fluids", wrong: ["Antibiotics", "Diet", "Bed rest"], rationale: "Fill the tank to fix the BP!" },
        { q: "Sign of hypoglycemia?", a: "Sweating & shakiness", wrong: ["Polyuria", "Weight gain", "Jaundice"], rationale: "Low blood sugar triggers adrenergic symptoms like sweating and tremors." },
        { q: "Sign of hypokalemia?", a: "Muscle weakness & cramps", wrong: ["Bradycardia & dry skin", "Diarrhea", "Polyuria"], rationale: "Low potassium affects muscle function and cardiac rhythm." },
        { q: "Sign of hypercalcemia?", a: "Constipation & confusion", wrong: ["Diarrhea", "Tachycardia", "Pale skin"], rationale: "High calcium levels can cause GI and CNS symptoms." },
        { q: "Sign of digoxin toxicity?", a: "Bradycardia & visual halos", wrong: ["Tachycardia & rash", "Hypertension", "Constipation"], rationale: "Classic digoxin toxicity includes bradycardia and visual disturbances." },
        { q: "Early signs of hypovolemic shock?", a: "Tachycardia, cool clammy skin", wrong: ["Bradycardia, warm skin", "Hypertension, flushed skin", "Fever"], rationale: "Early shock triggers sympathetic response." },
        { q: "Early sign of ICP increase?", a: "Confusion and restlessness", wrong: ["Bradycardia only", "Projectile vomiting only", "Seizures only"], rationale: "Cognitive changes are often first signs of rising intracranial pressure." },
        { q: "Early sign of hypoxia?", a: "Restlessness & anxiety", wrong: ["Bradycardia", "Blue lips", "Low BP"], rationale: "Restlessness is an early compensatory sign of hypoxia." },
        { q: "Early sign of lithium toxicity?", a: "Nausea, tremor, confusion", wrong: ["Seizure", "Blindness", "Rash"], rationale: "Mild toxicity manifests as GI and CNS symptoms; severe toxicity is life-threatening." },
        { q: "Position for a patient with shock?", a: "Supine with legs elevated", wrong: ["Trendelenburg", "High Fowler's", "Prone"], rationale: "Supine with legs elevated improves venous return and perfusion." },
        { q: "Priority for patient with shortness of breath?", a: "Assess airway & oxygen", wrong: ["Start IV fluids", "Call family", "Give pain meds"], rationale: "Airway and oxygenation are always the first priority." },
        { q: "Priority for suspected stroke?", a: "Assess ABCs & call stroke team", wrong: ["Give fluids", "Take history first", "Check urine output"], rationale: "Airway, breathing, circulation and rapid stroke response are urgent." },
        { q: "Priority for anaphylaxis?", a: "IM Epinephrine", wrong: ["Oral antihistamine", "IV fluids only", "Oxygen only"], rationale: "Epinephrine is life-saving and works immediately for severe allergic reactions." },
        { q: "Priority for hypovolemic shock?", a: "IV fluids", wrong: ["Oxygen only", "Give diuretics", "Elevate legs only"], rationale: "Restoring volume quickly is crucial to maintain perfusion." },
        { q: "Priority for patient with airway obstruction?", a: "Perform Heimlich or clear airway", wrong: ["Call family", "Give fluids", "Administer meds"], rationale: "Airway is always the top priority in an emergency." },
        { q: "Priority for a patient with hypoglycemia?", a: "Give 15-20g fast-acting carb", wrong: ["Administer insulin", "Give water", "Check vitals only"], rationale: "Immediate glucose administration prevents severe hypoglycemia complications." },
        { q: "Priority nursing action for sepsis?", a: "Obtain blood cultures & start antibiotics", wrong: ["Document vitals", "Administer antipyretic", "Call family"], rationale: "Early antibiotics and culture are critical to treat sepsis." },

    function initGame() {
        // FIX: clear victory flicker interval on restart
        clearInterval(flickerInterval);
        score = 0;
        scoreEl.innerText = `XP: 0/20`;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        nextQuestion();
    }

    function nextQuestion() {
        if (score >= 20) {
            victory();
            return;
        }

        currentQA = nclexData[Math.floor(Math.random() * nclexData.length)];
        questionEl.innerText = currentQA.q;

        let choices = [...currentQA.wrong, currentQA.a];
        choices.sort(() => Math.random() - 0.5);

        optionsEl.innerHTML = '';
        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice;
            btn.className = "arcade-btn";
            btn.onclick = () => checkAnswer(choice);
            optionsEl.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 100;
        timerInterval = setInterval(() => {
            timeLeft -= (100 / (TIME_LIMIT * 10));
            drawGame();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                checkAnswer("TIMEOUT");
            }
        }, 100);
    }

    function checkAnswer(choice) {
        clearInterval(timerInterval);
        const isCorrect = (choice === currentQA.a);
        const resText = document.getElementById('result-text');
        const ratText = document.getElementById('rationale-text');

        if (isCorrect) {
            score++;
            scoreEl.innerText = `XP: ${score}/20`;
            resText.innerText = "CRITICAL HIT! +1 XP";
            resText.style.color = "var(--neon-green)";
        } else {
            resText.innerText = choice === "TIMEOUT" ? "TIME EXPIRED!" : "SYSTEM ERROR!";
            resText.style.color = "#ff0033";
        }

        ratText.innerText = currentQA.rationale;
        overlay.style.display = "block";
    }

    function closeRationale() {
        overlay.style.display = "none";
        nextQuestion();
    }

    function drawGame() {
        ctx.fillStyle = '#2b0040';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Floor
        ctx.fillStyle = '#00ffff';
        ctx.fillRect(0, 250, canvas.width, 50);

        // Timer Bar outline
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 4;
        ctx.strokeRect(50, 20, 500, 30);

        let barColor = "#39ff14";
        if (timeLeft < 50) barColor = "#ffff00";
        if (timeLeft < 25) barColor = "#ff0033";

        ctx.fillStyle = barColor;
        ctx.fillRect(54, 24, (timeLeft / 100) * 492, 22);
    }

    function victory() {
        winSound.currentTime = 0;
        winSound.play().catch(() => {});
        clearInterval(timerInterval);
        questionEl.innerText = "";
        optionsEl.innerHTML = "<button class='arcade-btn continue-btn' onclick='initGame()'>RESTART</button>";

        ctx.fillStyle = "#39ff14";
        ctx.font = "bold 50px Courier New";
        ctx.textAlign = "center";
        ctx.shadowColor = "#00ffff";
        ctx.shadowBlur = 20;

        ctx.fillText("LEVEL", canvas.width / 2, 130);
        ctx.fillText("COMPLETE", canvas.width / 2, 190);
        ctx.fillText("INSERT COIN", canvas.width / 2, 260);

        // FIX: store interval ref so it can be cleared on restart
        flickerInterval = setInterval(() => {
            ctx.clearRect(0, 240, canvas.width, 60);
            if (Math.random() > 0.5) {
                ctx.fillText("INSERT COIN", canvas.width / 2, 260);
            }
        }, 300);
    }

    initGame();

    document.addEventListener("click", () => {
        if (!hasStarted) {
            startSound.currentTime = 0;
            startSound.play().catch(() => {});
            hasStarted = true;
        }
    }, { once: true });

    function playExit(e, url) {
        e.preventDefault();
        exitSound.currentTime = 0;
        exitSound.play().catch(() => {});
        setTimeout(() => { window.location.href = url; }, 300);
    }
