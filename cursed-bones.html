<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CURSED BONES: RESTORED</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-green: #39ff14;
            --retro-red: #ff0055;
            --bg: #0a0a0a;
        }

        /* 1. RESTORE SCROLL LOCK */
        html, body {
            height: 100%;
            overflow: hidden; 
            position: fixed;
            width: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Courier New', monospace;
            margin: 0;
        }

        #game-header {
            height: 60px;
            background: #111;
            border-bottom: 2px solid var(--retro-red);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        /* 2. RESTORE YOUR EXACT CALIBRATION SIZE */
        #skeleton-container {
            position: relative;
            width: 100vw;
            max-width: 420px;
            /* 80px margin matches your calibration exactly */
            margin: 20px auto 0; 
            border: 1px solid #333;
            background: #050505;
        }

        #skeleton-image { 
            width: 100%; 
            display: block; 
            pointer-events: none; 
            opacity: 0.9; 
        }

        /* 3. RESTORE LABEL STYLES */
        .label-sticker {
            position: absolute;
            padding: 4px 8px;
            background: var(--neon-blue);
            color: black;
            font-weight: bold;
            font-size: 10px;
            border-radius: 3px;
            touch-action: none;
            z-index: 1000;
            white-space: nowrap;
            text-transform: uppercase;
            /* Added this to fix the "Center" drop point */
            transform: translate(-50%, -50%);
        }

        .label-sticker.locked {
            background: var(--neon-green) !important;
            box-shadow: 0 0 10px var(--neon-green);
            pointer-events: none;
            z-index: 500;
        }

        /* 4. RESTORE WORD BANK AT BOTTOM */
        #sticker-bank {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 180px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            padding: 15px;
            background: #111;
            border-top: 2px solid #333;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .static { 
            position: relative !important; 
            top: auto !important; 
            left: auto !important; 
            transform: none !important; 
        }

        #win-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5000;
        }
    </style>
</head>
<body>

    <div id="game-header">
        <div>REANIMATED: <span id="count">0</span>/17</div>
    </div>

    <div id="skeleton-container">
        <img src="skeleton.JPG" id="skeleton-image">
        </div>

    <div id="sticker-bank"></div>

    <div id="win-overlay">
        <h1 style="color: var(--neon-green); font-size: 40px;">COMPLETE</h1>
        <button onclick="location.reload()" style="padding: 15px; background: black; color: white; border: 1px solid white;">RESTART</button>
    </div>

<script>
    const config = {
        "cervical": { top: "26.9%", left: "33.9%" },
        "patella": { top: "79.1%", left: "52.1%" },
        "femur": { top: "68.1%", left: "34.6%" },
        "coccyx": { top: "56.6%", left: "43.4%" },
        "radius": { top: "53.3%", left: "71.6%" },
        "coxal": { top: "53.5%", left: "53.3%" },
        "lumbar": { top: "50.2%", left: "37.7%" },
        "thoracic": { top: "43.1%", left: "35.1%" },
        "ribs": { top: "39.5%", left: "54.5%" },
        "ulna": { top: "54.3%", left: "27.7%" },
        "humerus": { top: "38.7%", left: "25.6%" },
        "clavicle": { top: "28.8%", left: "53.8%" },
        "scapula": { top: "31.9%", left: "55.0%" },
        "sternum": { top: "33.0%", left: "43.1%" },
        "mandible": { top: "21.0%", left: "31.5%" },
        "acromion": { top: "29.2%", left: "27.7%" },
        "cranium": { top: "15.3%", left: "43.1%" }
    };

    const bank = document.getElementById('sticker-bank');
    const container = document.getElementById('skeleton-container');
    let solvedCount = 0;

    Object.keys(config).forEach(id => {
        const div = document.createElement('div');
        div.id = id;
        div.className = 'label-sticker static';
        div.innerText = id.toUpperCase();
        bank.appendChild(div);

        div.addEventListener('touchstart', (e) => {
            div.classList.remove('static');
            div.style.position = 'absolute';
            container.appendChild(div); 
        });

        div.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.targetTouches[0];
            const rect = container.getBoundingClientRect();
            let x = ((touch.pageX - rect.left) / rect.width * 100);
            let y = ((touch.pageY - rect.top) / rect.height * 100);
            div.style.left = x + '%';
            div.style.top = y + '%';
        }, {passive: false});

        div.addEventListener('touchend', (e) => {
            const touch = e.changedTouches[0];
            const rect = container.getBoundingClientRect();
            let fx = ((touch.pageX - rect.left) / rect.width * 100);
            let fy = ((touch.pageY - rect.top) / rect.height * 100);

            const target = config[div.id];
            // Snap check (7% buffer)
            if (Math.abs(fx - parseFloat(target.left)) < 7 && Math.abs(fy - parseFloat(target.top)) < 7) {
                div.style.left = target.left;
                div.style.top = target.top;
                div.classList.add('locked');
                solvedCount++;
                document.getElementById('count').innerText = solvedCount;
                if (solvedCount === 17) document.getElementById('win-overlay').style.display = 'flex';
            } else {
                div.classList.add('static');
                bank.appendChild(div);
            }
        });
    });
</script>
</body>
</html>
