        .header { width: 100%; max-width: 650px; border-bottom: 2px solid var(--pharma-dim); padding-bottom: 15px; margin-bottom: 20px; }

<script>
    async function executePharmaScan() {
        const queryInput = document.getElementById('query').value;
        if (!queryInput) return;
        const feed = document.getElementById('feed');
        feed.innerHTML = "<div style='color:var(--pharma-gold)'>● DECRYPTING MOLECULAR STRUCTURE...</div>";

        try {
            const res = await fetch(`https://api.fda.gov/drug/label.json?search=openfda.brand_name:"${queryInput}"+openfda.generic_name:"${queryInput}"&limit=1`);
            const data = await res.json();
            if (!data.results) throw new Error();
            
            const drug = data.results[0];
            const info = drug.openfda;
            
            feed.innerHTML = `
                <div class="drug-card">
                    <div style="color:var(--pharma-gold); font-size:0.7rem; font-weight:bold;">${info.manufacturer_name ? info.manufacturer_name[0] : 'GENERIC ARCHIVE'}</div>
                    <div style="font-size:1.2rem; font-weight:bold; margin: 10px 0;">${info.brand_name ? info.brand_name[0] : queryInput.toUpperCase()}</div>
                    <div style="color:var(--text-dim); font-size:0.8rem; margin-bottom:15px;">GENERIC: ${info.generic_name ? info.generic_name[0] : 'UNKNOWN'}</div>
                    
                    <div style="font-size:0.8rem; line-height:1.6;">
                        <strong style="color:var(--pharma-gold)">INDICATIONS:</strong><br>
                        ${drug.indications_and_usage ? drug.indications_and_usage[0].split('.')[0] : 'N/A'}.
                        <br><br>
                        <strong style="color:var(--pharma-gold)">ADVERSE REACTIONS:</strong><br>
                        ${drug.adverse_reactions ? drug.adverse_reactions[0].substring(0, 300) : 'N/A'}...
                    </div>
                </div>
            `;
        } catch (e) {
            feed.innerHTML = "<div style='color:var(--alert)'>● ERROR: COMPOUND NOT IN DATABASE</div>";
        }
    }

    function quickSearch(val) {
        document.getElementById('query').value = val;
        executePharmaScan();
    }

    function identifyPill() {
    const imprintInput = document.getElementById('imprint');
    const imprint = imprintInput.value.trim();
    const status = document.getElementById('pill-status');
    
    if (!imprint) {
        alert("CRITICAL: Imprint required for physical ID.");
        return;
    }

    status.innerText = "● UPLINKING TO DATABASE...";
    status.style.color = "var(--pharma-gold)";
    
    // Construct the direct search URL for Drugs.com
    const searchUrl = `https://www.drugs.com/pill_identification.html?imprint=${encodeURIComponent(imprint)}`;
    
    // Open in a new tab
    window.open(searchUrl, '_blank');
    
    setTimeout(() => {
        status.innerText = "● SCAN COMPLETE // CHECK EXTERNAL TAB";
    }, 1500);
}



</script>
