<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&P UPLINK: Hole's Edition</title>
    <style>
        :root {
            --bg: #050a0f;
            --panel: #0d151c;
            --text: #e0f2f1;
            --accent: #00cfff;
            --accent-dim: rgba(0, 207, 255, 0.3);
            --clinical: #ff9d00; /* Distinct color for Hole's Clinical Notes */
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Orbitron, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }

        /* Cyberpunk Header */
        header {
            padding: 15px 25px;
            background: linear-gradient(90deg, #0d151c, #1a2a36);
            border-bottom: 2px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center;
        }

        #main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px; padding: 20px;
            max-height: 85vh; overflow-y: auto;
        }

        .chapter-card {
            background: var(--panel);
            border: 1px solid var(--accent-dim);
            padding: 20px; text-align: center; cursor: pointer;
            transition: 0.3s;
        }

        .chapter-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-dim);
            transform: translateY(-3px);
        }

        /* Study Overlay */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; padding: 20px;
        }

        .study-content {
            max-width: 800px; margin: 0 auto; width: 100%;
            overflow-y: auto; padding-right: 15px;
        }

        .study-section {
            background: rgba(255,255,255,0.05);
            border-left: 4px solid var(--accent);
            padding: 20px; margin-bottom: 20px;
        }

        .clinical-note {
            background: rgba(255, 157, 0, 0.1);
            border-left: 4px solid var(--clinical);
            padding: 10px; margin: 10px 0; font-size: 0.9rem;
        }

        .concept-list { padding-left: 20px; color: #b0bec5; }
        .concept-list li { margin: 8px 0; }

        button {
            background: none; border: 1px solid var(--accent);
            color: var(--accent); padding: 10px 20px; cursor: pointer;
        }

        button:hover { background: var(--accent); color: white; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; letter-spacing: 2px;">ELINA'S UPLINK: HOLE'S A&P</div>
    <div id="stats">BSN<span id="credit-count">🩺</span></div>
</header>
<header style="padding: 10px 20px; border-bottom: 2px solid var(--accent); background: #0d151c;">
    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
        
        <div style="display: flex; align-items: center; gap: 20px;">
            <a href="https://maximumreality.github.io/medical/index.html" 
               style="text-decoration: none; border: 1px solid var(--accent); color: var(--accent); padding: 5px 12px; font-size: 0.7rem; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; transition: 0.3s;">TERMINAL</a>
            <div style="font-weight: bold; letter-spacing: 2px; font-size: 0.9rem; color: var(--text);"></div>
        </div>

        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="text-align: right;">
                <div style="font-size: 1rem; font-weight: bold; color: var(--accent);">ELINA v1.0</div>
                <div id="credit-count" style="font-size: 0.8rem; opacity: 0.8; color: #fff;">CREDITS: 5</div>
            </div>
            <img src="IMG_8282.png" 
                 style="width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; box-shadow: 0 0 10px var(--accent-dim);">
        </div>
    </div>
</header>


<div id="main-grid"></div>

<div id="overlay">
    <div style="display:flex; justify-content: space-between; margin-bottom: 20px;">
        <h2 id="modal-title" style="color:var(--accent); margin:0;"></h2>
        <button onclick="closeOverlay()">TERMINATE LINK</button>
    </div>
    <div class="study-content" id="study-body"></div>
</div>

<script src="data/ch1.js"></script>
<script src="data/ch2.js"></script>
<script src="data/ch3.js"></script>
<script src="data/ch4.js"></script>
<script src="data/ch5.js"></script>
<script src="data/ch6.js"></script>
<script src="data/ch7.js"></script>
<script src="data/ch8.js"></script>
<script src="data/ch9.js"></script>
<script src="data/ch10.js"></script>
<script src="data/ch11.js"></script>
<script src="data/ch12.js"></script>
<script src="data/ch13.js"></script>

<script>
        const CHAPTERS = [
        CH1_DATA, CH2_DATA, CH3_DATA, CH4_DATA, CH5_DATA, 
        CH6_DATA, CH7_DATA, CH8_DATA, CH9_DATA, CH10_DATA, 
        CH11_DATA, CH12_DATA, CH13_DATA
    ];

    function init() {
        const grid = document.getElementById('main-grid');
        
        // 1. Map existing data-driven chapters
        let gridHTML = CHAPTERS.map((ch, idx) => `
            <div class="chapter-card" onclick="openChapter(${idx})">
                <div style="font-size: 0.8rem; opacity: 0.6;">MODULE ${ch.num}</div>
                <div style="font-weight: bold; margin: 10px 0;">${ch.title}</div>
            </div>
        `).join('');

        // 2. Add the Manual "Module 14" Final Exam Card
        gridHTML += `
            <a href="https://maximumreality.github.io/medical/absn_final.html" style="text-decoration: none;">
                <div class="chapter-card" style="border-color: #ff3e3e; background: rgba(255, 62, 62, 0.05);">
                    <div style="font-size: 0.8rem; color: #ff3e3e; font-weight: bold;">MODULE 14</div>
                    <div style="font-weight: bold; margin: 10px 0; color: #ff3e3e;">🔥 FINAL COMPREHENSIVE EXAM</div>
                    <div style="font-size: 0.6rem; opacity: 0.7; color: #ff3e3e;">[ NEURAL EVALUATION ]</div>
                </div>
            </a>
        `;

        grid.innerHTML = gridHTML;
    }

    function openChapter(index) {
        currentCH = CHAPTERS[index];
        // Ensure overlay is reset and title updated
        document.getElementById('modal-title').innerText = `MOD ${currentCH.num}: ${currentCH.title}`;
        document.getElementById('overlay').style.display = 'flex';
        renderStudy();
    }
    

    function md(text) {
    return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>');
}

    function renderStudy() {
    const body = document.getElementById('study-body');
    
    // This loop creates the HTML for each section in the chapter
    const sectionsHTML = currentCH.sections.map(sec => {
        // 1. Process the bullet points (details)
        const detailItems = sec.details.map(detail => {
    if(detail.includes("Clinical Note")) {
        return `<div class="clinical-note">${md(detail)}</div>`;
    }
    return `<li>${md(detail)}</li>`;
}).join('');


        // 2. NEW: Process the image from the .js file
        // If 'image' exists in the JS, create an <img> tag. If not, leave it empty.
        const imageHTML = sec.image ? 
            `<div style="text-align:center; margin: 20px 0;">
                <img src="${sec.image}" 
                     style="max-width:100%; border-radius:8px; border: 1px solid var(--accent-dim); box-shadow: 0 0 15px rgba(0,207,255,0.1);"
                     alt="${sec.label}">
            </div>` 
            : '';

        // 3. Combine everything into the section block
        return `
            <div class="study-section">
                <h3 style="margin-top:0; color:var(--accent);">◈ ${sec.label}</h3>
                <p style="font-size:0.95rem; line-height:1.5; color:#cfd8dc;">${md(sec.content)}</p>
                
                ${imageHTML} <ul class="concept-list">${detailItems}</ul>
            </div>
        `;
    }).join('');

    // 4. Add the vocab section at the bottom
    const vocabHTML = `
        <div class="study-section" style="border-left-color: #607d8b;">
            <h3 style="color:#90a4ae;">TERMINOLOGY DATABASE</h3>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
                ${currentCH.vocab.map(v => `
                    <div style="background: rgba(255,255,255,0.03); padding: 10px; border-radius: 4px;">
                        <b style="color:var(--accent)">${v.t}:</b> 
                        <span style="font-size: 0.9rem; opacity: 0.8;">${v.d}</span>
                    </div>
                `).join('')}
            </div>
        </div>
    `;

    body.innerHTML = sectionsHTML + vocabHTML;
}

    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
    }

    init();
</script>
</body>
</html>
